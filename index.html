<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具导航 - 发现最新AI工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f0f0f;
            color: #e5e5e5;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
            border-bottom: 1px solid #2a2a2a;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            flex: 1;
            max-width: 500px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
        }

        .ad-banner-top {
            background: #1a1a1a;
            border: 1px dashed #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #666;
            margin: 20px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            padding: 30px 0;
        }

        .sidebar {
            position: sticky;
            top: 100px;
            height: fit-content;
        }

        .ad-sidebar {
            background: #1a1a1a;
            border: 1px dashed #333;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            color: #666;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .categories {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
        }

        .categories h3 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .category-list {
            list-style: none;
        }

        .category-list li {
            margin-bottom: 8px;
        }

        .category-list button {
            width: 100%;
            padding: 10px 15px;
            border: none;
            background: transparent;
            color: #b0b0b0;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-list button:hover,
        .category-list button.active {
            background: #2a2a2a;
            color: #fff;
        }

        .category-list button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .category-list button .count {
            background: #333;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .content-area h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #fff;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .tool-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .tool-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .tool-info h4 {
            color: #fff;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .tool-info .tag {
            font-size: 11px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .tool-desc {
            color: #888;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-tags span {
            background: #2a2a2a;
            color: #aaa;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
        }

        footer {
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            padding: 30px 0;
            margin-top: 40px;
            text-align: center;
            color: #666;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }

            .ad-sidebar {
                min-height: 250px;
            }

            .categories {
                order: 2;
            }

            .header-content {
                flex-wrap: wrap;
            }

            .search-box {
                order: 3;
                max-width: 100%;
                width: 100%;
            }
        }

        @media (max-width: 600px) {
            .sidebar {
                grid-template-columns: 1fr;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <span>🤖</span>
                AI工具导航
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索AI工具...">
            </div>
        </div>
    </header>

    <div class="container">
        <div class="ad-banner-top">
            <div>
                <p style="font-size: 14px; margin-bottom: 5px;">广告位 728x90</p>
                <p style="font-size: 12px;">可放置横幅广告</p>
            </div>
        </div>

        <div class="main-content">
            <aside class="sidebar">
                <div class="ad-sidebar">
                    <div>
                        <p style="font-size: 14px; margin-bottom: 5px;">广告位 300x250</p>
                        <p style="font-size: 12px;">可放置矩形广告</p>
                    </div>
                </div>

                <div class="categories">
                    <h3>工具分类</h3>
                    <ul class="category-list">
                        <li><button class="active" data-category="all">全部工具 <span class="count" id="count-all">0</span></button></li>
                        <li><button data-category="text">文本生成 <span class="count" id="count-text">0</span></button></li>
                        <li><button data-category="image">图像生成 <span class="count" id="count-image">0</span></button></li>
                        <li><button data-category="code">代码辅助 <span class="count" id="count-code">0</span></button></li>
                        <li><button data-category="video">视频生成 <span class="count" id="count-video">0</span></button></li>
                        <li><button data-category="audio">音频处理 <span class="count" id="count-audio">0</span></button></li>
                        <li><button data-category="productivity">效率工具 <span class="count" id="count-productivity">0</span></button></li>
                    </ul>
                </div>
            </aside>

            <main class="content-area">
                <h2 id="categoryTitle">全部工具</h2>
                <div class="tools-grid" id="toolsGrid"></div>
            </main>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2024 AI工具导航 - 发现最新AI工具</p>
        </div>
    </footer>

    <script>
        const toolsData = [
            {
                name: "ChatGPT",
                icon: "💬",
                category: "text",
                tag: "热门",
                desc: "OpenAI开发的强大对话AI，可以进行自然语言对话、写作、翻译等多种任务。",
                keywords: ["对话", "写作", "翻译"]
            },
            {
                name: "Midjourney",
                icon: "🎨",
                category: "image",
                tag: "热门",
                desc: "基于AI的图像生成工具，可以根据文字描述创建令人惊叹的艺术作品。",
                keywords: ["图像生成", "艺术", "设计"]
            },
            {
                name: "GitHub Copilot",
                icon: "⚡",
                category: "code",
                tag: "必备",
                desc: "AI驱动的代码补全工具，帮助开发者更快速地编写高质量代码。",
                keywords: ["代码补全", "编程", "开发"]
            },
            {
                name: "Runway",
                icon: "🎬",
                category: "video",
                tag: "新品",
                desc: "强大的AI视频生成和编辑平台，支持多种创意视频制作功能。",
                keywords: ["视频生成", "视频编辑", "创作"]
            },
            {
                name: "ElevenLabs",
                icon: "🎙️",
                category: "audio",
                tag: "推荐",
                desc: "先进的AI语音合成工具，可以生成自然逼真的语音内容。",
                keywords: ["语音合成", "配音", "音频"]
            },
            {
                name: "Notion AI",
                icon: "📝",
                category: "productivity",
                tag: "热门",
                desc: "集成在Notion中的AI助手，帮助你更高效地写作和整理信息。",
                keywords: ["笔记", "写作", "整理"]
            },
            {
                name: "Claude",
                icon: "🧠",
                category: "text",
                tag: "推荐",
                desc: "Anthropic开发的AI助手，擅长分析、写作和代码辅助任务。",
                keywords: ["对话", "分析", "写作"]
            },
            {
                name: "Stable Diffusion",
                icon: "🖼️",
                category: "image",
                tag: "免费",
                desc: "开源的AI图像生成模型，支持本地部署和高度自定义。",
                keywords: ["图像生成", "开源", "定制"]
            },
            {
                name: "Cursor",
                icon: "📄",
                category: "code",
                tag: "新品",
                desc: "基于AI的代码编辑器，专注于提高编程效率和代码质量。",
                keywords: ["编辑器", "编程", "AI"]
            },
            {
                name: "HeyGen",
                icon: "🎥",
                category: "video",
                tag: "热门",
                desc: "AI视频生成平台，可以快速创建数字人视频和营销内容。",
                keywords: ["数字人", "营销", "视频"]
            },
            {
                name: "Murf AI",
                icon: "🔊",
                category: "audio",
                tag: "推荐",
                desc: "专业的AI配音平台，支持多语言、多音色的语音合成服务。",
                keywords: ["配音", "多语言", "语音"]
            },
            {
                name: "Otter.ai",
                icon: "🦦",
                category: "productivity",
                tag: "实用",
                desc: "AI会议助手，自动记录、转录和分析会议内容。",
                keywords: ["会议", "转录", "记录"]
            },
            {
                name: "Jasper",
                icon: "✍️",
                category: "text",
                tag: "热门",
                desc: "专业的AI文案生成工具，帮助快速创建营销文案和内容。",
                keywords: ["文案", "营销", "内容"]
            },
            {
                name: "DALL-E 3",
                icon: "🖌️",
                category: "image",
                tag: "热门",
                desc: "OpenAI开发的图像生成AI，可以根据文字描述创建精美图像。",
                keywords: ["图像生成", "创意", "设计"]
            },
            {
                name: "Replit",
                icon: "🚀",
                category: "code",
                tag: "实用",
                desc: "在线AI编程平台，支持多人协作和AI代码生成功能。",
                keywords: ["在线IDE", "协作", "编程"]
            },
            {
                name: "Synthesia",
                icon: "🎭",
                category: "video",
                tag: "热门",
                desc: "AI视频生成平台，专注于创建AI数字人视频内容。",
                keywords: ["数字人", "培训", "视频"]
            }
        ];

        let currentCategory = 'all';

        function updateCategoryCounts() {
            const counts = {
                all: toolsData.length,
                text: toolsData.filter(t => t.category === 'text').length,
                image: toolsData.filter(t => t.category === 'image').length,
                code: toolsData.filter(t => t.category === 'code').length,
                video: toolsData.filter(t => t.category === 'video').length,
                audio: toolsData.filter(t => t.category === 'audio').length,
                productivity: toolsData.filter(t => t.category === 'productivity').length
            };

            for (const [key, value] of Object.entries(counts)) {
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = value;
            }
        }

        function renderTools(category = 'all', searchTerm = '') {
            const grid = document.getElementById('toolsGrid');
            let filteredTools = toolsData;

            if (category !== 'all') {
                filteredTools = filteredTools.filter(t => t.category === category);
            }

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredTools = filteredTools.filter(t =>
                    t.name.toLowerCase().includes(term) ||
                    t.desc.toLowerCase().includes(term) ||
                    t.keywords.some(k => k.toLowerCase().includes(term))
                );
            }

            grid.innerHTML = filteredTools.map(tool => `
                <div class="tool-card" onclick="window.open('#', '_blank')">
                    <div class="tool-header">
                        <div class="tool-icon">${tool.icon}</div>
                        <div class="tool-info">
                            <h4>${tool.name}</h4>
                            <span class="tag">${tool.tag}</span>
                        </div>
                    </div>
                    <p class="tool-desc">${tool.desc}</p>
                    <div class="tool-tags">
                        ${tool.keywords.map(k => `<span>${k}</span>`).join('')}
                    </div>
                </div>
            `).join('');

            if (filteredTools.length === 0) {
                grid.innerHTML = '<p style="color: #666; text-align: center; padding: 40px;">没有找到匹配的工具</p>';
            }
        }

        function setupCategoryButtons() {
            const buttons = document.querySelectorAll('.category-list button');
            const title = document.getElementById('categoryTitle');
            const categoryNames = {
                all: '全部工具',
                text: '文本生成',
                image: '图像生成',
                code: '代码辅助',
                video: '视频生成',
                audio: '音频处理',
                productivity: '效率工具'
            };

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    title.textContent = categoryNames[currentCategory];
                    renderTools(currentCategory, document.getElementById('searchInput').value);
                });
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                renderTools(currentCategory, e.target.value);
            });
        }

        function init() {
            updateCategoryCounts();
            renderTools();
            setupCategoryButtons();
            setupSearch();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
